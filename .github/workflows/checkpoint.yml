name: Version checkpoint (vs previous + vs 2 Stockfish levels)

# The standard "how much did we improve, and what's our absolute strength"
# check: run a new version against the previous checkpoint AND against two
# Stockfish levels bracketing its expected rating, all in one dispatch.
#
# Sharded so all three comparisons run as one wave of concurrent jobs. GitHub
# Actions caps an account at 20 concurrent jobs (free plan, applies even to
# public repos with otherwise-unlimited minutes) - total_play_jobs defaults
# to that exact ceiling. The 3 comparisons don't split evenly into 20, so
# setup distributes shards (and each shard's own game count) as evenly as
# possible per comparison (7/7/6) rather than requiring a multiple of 3.
# Games-per-shard, not total games, is what determines wall time: doubling
# games_per_comparison roughly doubles run time, since job count is capped.
on:
  workflow_dispatch:
    inputs:
      ref_new:
        description: "git ref of the new version being evaluated"
        type: string
        default: ""
      ref_prev:
        description: "git ref of the previous checkpoint to compare against"
        type: string
        required: true
      stockfish_elo_a:
        description: "first Stockfish UCI_Elo to compare against (1320-3190)"
        type: string
        default: "1600"
      stockfish_elo_b:
        description: "second Stockfish UCI_Elo to compare against (1320-3190)"
        type: string
        default: "1800"
      games_per_comparison:
        description: "games to play for EACH of the 3 comparisons"
        type: number
        default: 100
      total_play_jobs:
        description: "total concurrent play jobs across all 3 comparisons (GitHub's account-wide cap is 20)"
        type: number
        default: 20
      movetime:
        description: "ms per move"
        type: number
        default: 150
      max_plies:
        description: "safety cap; games still going at this ply count are aborted"
        type: number
        default: 200

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          python3 -c "
          import json

          def split_evenly(total, parts):
              # e.g. split_evenly(20, 3) -> [7, 7, 6]; split_evenly(100, 7) -> 7 values summing to 100
              base, rem = divmod(total, parts)
              return [base + 1 if i < rem else base for i in range(parts)]

          comparisons = ['prev', 'sfA', 'sfB']
          shard_counts = split_evenly(${{ inputs.total_play_jobs }}, len(comparisons))

          matrix = []
          for comparison, shard_count in zip(comparisons, shard_counts):
              games_per_shard = split_evenly(${{ inputs.games_per_comparison }}, shard_count)
              offset = 0
              for shard, games in enumerate(games_per_shard):
                  matrix.append({'comparison': comparison, 'shard': shard, 'games': games, 'offset': offset})
                  offset += games
          print(json.dumps(matrix))
          " > /tmp/matrix.json
          echo "matrix=$(cat /tmp/matrix.json)" >> "$GITHUB_OUTPUT"

  build-new:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref_new || github.sha }}
      - id: resolve
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -q -DskipTests package
      - uses: actions/upload-artifact@v4
        with:
          name: engine-new-jar
          path: target/my-project-1.0-SNAPSHOT.jar
          retention-days: 7

  build-prev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref_prev }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -q -DskipTests package
      - uses: actions/upload-artifact@v4
        with:
          name: engine-prev-jar
          path: target/my-project-1.0-SNAPSHOT.jar
          retention-days: 7

  play:
    needs: [setup, build-new, build-prev]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }} # bench/ tooling always comes from the ref that triggered this run

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r bench/requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: engine-new-jar
          path: engine-new

      - name: Download previous-version jar
        if: matrix.comparison == 'prev'
        uses: actions/download-artifact@v4
        with:
          name: engine-prev-jar
          path: engine-prev

      - name: Install Stockfish
        if: matrix.comparison != 'prev'
        run: sudo apt-get update && sudo apt-get install -y stockfish

      - name: Play this shard's games
        run: |
          mkdir -p shard-results
          ENGINE_NEW="java -jar engine-new/my-project-1.0-SNAPSHOT.jar"

          case "${{ matrix.comparison }}" in
            prev)
              ENGINE_B="java -jar engine-prev/my-project-1.0-SNAPSHOT.jar"
              NAME_B="prev"
              OPTS_B=""
              ;;
            sfA)
              ENGINE_B="stockfish"
              NAME_B="stockfish-${{ inputs.stockfish_elo_a }}"
              OPTS_B="UCI_LimitStrength=true,UCI_Elo=${{ inputs.stockfish_elo_a }}"
              ;;
            sfB)
              ENGINE_B="stockfish"
              NAME_B="stockfish-${{ inputs.stockfish_elo_b }}"
              OPTS_B="UCI_LimitStrength=true,UCI_Elo=${{ inputs.stockfish_elo_b }}"
              ;;
          esac

          python bench/run_match.py \
            --engine-a "$ENGINE_NEW" --engine-a-name new \
            --engine-b "$ENGINE_B" --engine-b-name "$NAME_B" \
            --engine-b-options "$OPTS_B" \
            --games ${{ matrix.games }} \
            --game-offset ${{ matrix.offset }} \
            --movetime ${{ inputs.movetime }} \
            --max-plies ${{ inputs.max_plies }} \
            --pgn-out "shard-results/${{ matrix.comparison }}-${{ matrix.shard }}.pgn" \
            --summary-out "shard-results/${{ matrix.comparison }}-${{ matrix.shard }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.comparison }}-${{ matrix.shard }}-results
          path: shard-results/

  aggregate:
    needs: [build-new, play]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        # No ref override: checks out the branch that dispatched this workflow,
        # so the "record checkpoint" step below can push back to it.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: shard-*-results
          path: all-results
          merge-multiple: true
      - name: Aggregate each comparison
        run: |
          {
            echo "## new (${{ needs.build-new.outputs.sha }}) vs prev (${{ inputs.ref_prev }})"
            python bench/aggregate_results.py "all-results/prev-*.json" --json-out vs-prev.json
            echo
            echo "## new vs Stockfish ${{ inputs.stockfish_elo_a }}"
            python bench/aggregate_results.py "all-results/sfA-*.json" --json-out vs-sfA.json
            echo
            echo "## new vs Stockfish ${{ inputs.stockfish_elo_b }}"
            python bench/aggregate_results.py "all-results/sfB-*.json" --json-out vs-sfB.json
          } | tee "$GITHUB_STEP_SUMMARY"
          cat all-results/*.pgn > combined.pgn
      - uses: actions/upload-artifact@v4
        with:
          name: combined-pgn
          path: combined.pgn
          retention-days: 30
      - name: Record checkpoint to bench/history.jsonl
        run: |
          # Re-sync to the branch tip right before appending+pushing, to keep
          # the race window (another push landing mid-run) as small as
          # possible. This is a personal-scale repo; a hard reset here is
          # safe since we're about to add one line, not build on local state.
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}

          python bench/record_checkpoint.py \
            --ref-new "${{ inputs.ref_new || github.sha }}" \
            --ref-new-sha "${{ needs.build-new.outputs.sha }}" \
            --ref-prev "${{ inputs.ref_prev }}" \
            --stockfish-elo-a "${{ inputs.stockfish_elo_a }}" \
            --stockfish-elo-b "${{ inputs.stockfish_elo_b }}" \
            --vs-prev-json vs-prev.json \
            --vs-sfa-json vs-sfA.json \
            --vs-sfb-json vs-sfB.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bench/history.jsonl
          git commit -m "Record checkpoint: new ${{ needs.build-new.outputs.sha }} vs prev ${{ inputs.ref_prev }}"
          git push origin HEAD:${{ github.ref_name }}

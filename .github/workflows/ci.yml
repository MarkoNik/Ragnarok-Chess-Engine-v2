name: CI

# Gate for every pull request into master: build + run the fast test suite
# (unit tests, integration tests, and the fast perft tier - the slow-tagged
# deep perft cases are excluded here since they're a correctness safety net,
# not something that needs to block every PR). Required as a status check by
# branch protection on master, so this must pass before a PR can be merged.
on:
  pull_request:
    branches: [master]
    paths-ignore:
      - "bench/history.jsonl"
  push:
    branches: [master]
    paths-ignore:
      - "bench/history.jsonl"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - run: mvn -B test
